name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  PLUGIN_SLUG: gt-link-manager

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_VERSION#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version matches plugin
        env:
          TAG_VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          PLUGIN_VERSION=$(grep "Version:" "${PLUGIN_SLUG}.php" | head -1 | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Plugin version ($PLUGIN_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PLUGIN_VERSION"

      - name: Generate changelog
        id: changelog
        env:
          TAG: ${{ steps.get_version.outputs.TAG }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          CHANGELOG_FILE=$(mktemp)

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog: ${PREV_TAG}..${TAG}"

            SECTION=$(sed -n "/^= ${VERSION} =/,/^= [0-9]/p" readme.txt | sed '$d' | tail -n +2)

            if [ -n "$SECTION" ]; then
              echo "## What's Changed" >> "$CHANGELOG_FILE"
              echo "" >> "$CHANGELOG_FILE"
              echo "$SECTION" | sed 's/^\* /- /' >> "$CHANGELOG_FILE"
              echo "" >> "$CHANGELOG_FILE"
            fi

            echo "## Commits" >> "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges >> "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}" >> "$CHANGELOG_FILE"
          else
            echo "## Initial Release" >> "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "First release of GT Link Manager v${VERSION}." >> "$CHANGELOG_FILE"
          fi

          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"

          echo "--- Generated changelog ---"
          cat "$CHANGELOG_FILE"

      - name: Build block editor assets
        run: |
          set -euo pipefail

          for block_dir in blocks/*/; do
            if [ -f "${block_dir}package.json" ]; then
              echo "Building assets in ${block_dir}"
              (
                cd "${block_dir}"
                npm install --silent
                npm run build
              )
            fi
          done

      - name: Assemble distribution
        run: |
          mkdir -p "build-release/${PLUGIN_SLUG}"

          rsync -a \
            --exclude-from=".distignore" \
            --exclude="build-release" \
            . "build-release/${PLUGIN_SLUG}/"

          find build-release -name ".DS_Store" -delete 2>/dev/null || true
          find build-release -type d -empty -delete 2>/dev/null || true

      - name: Verify distribution
        run: |
          DIST="build-release/${PLUGIN_SLUG}"
          MISSING=0

          for f in \
            "${PLUGIN_SLUG}.php" \
            "uninstall.php" \
            "readme.txt" \
            "includes/class-gt-link-db.php" \
            "includes/class-gt-link-redirect.php" \
            "includes/class-gt-link-admin.php" \
            "includes/class-gt-link-admin-pages.php" \
            "includes/class-gt-link-rest-api.php" \
            "includes/class-gt-link-block-editor.php" \
            "includes/class-gt-link-import.php" \
            "includes/class-gt-link-settings.php" \
            "includes/class-gt-link-activator.php" \
            "includes/class-gt-link-deactivator.php" \
            "includes/class-gt-link-list-table.php" \
            "includes/class-gt-link-license.php" \
            "assets/css/admin.css" \
            "assets/js/admin.js" \
            "blocks/link-inserter/build/index.js" \
            "blocks/link-inserter/build/index.asset.php" \
            "languages/gt-link-manager.pot"; do
              if [ ! -f "$DIST/$f" ]; then
                echo "::error::Missing critical file: $f"
                MISSING=$((MISSING + 1))
              fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::Distribution is incomplete ($MISSING files missing)"
            exit 1
          fi

          echo "Distribution verified"
          FILE_COUNT=$(find "$DIST" -type f | wc -l | tr -d ' ')
          echo "  Files: ${FILE_COUNT}"

      - name: Create zip file
        id: zip
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          cd build-release
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"
          zip -rq "../${ZIP_NAME}" "${PLUGIN_SLUG}"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

          ZIP_SIZE=$(du -h "${ZIP_NAME}" | cut -f1)
          FILE_COUNT=$(zipinfo -t "${ZIP_NAME}" 2>/dev/null | sed 's/[^0-9]*\([0-9]*\) file.*/\1/' || echo "?")
          echo "ZIP_SIZE=${ZIP_SIZE}" >> "$GITHUB_OUTPUT"
          echo "FILE_COUNT=${FILE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        env:
          ZIP_NAME: ${{ steps.zip.outputs.ZIP_NAME }}
        run: |
          sha256sum "$ZIP_NAME" > "${ZIP_NAME}.sha256"
          md5sum "$ZIP_NAME" > "${ZIP_NAME}.md5"
          echo "SHA256: $(cat "${ZIP_NAME}.sha256")"

      - name: Update release with changelog and assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.CHANGELOG_FILE }}
          files: |
            ${{ steps.zip.outputs.ZIP_NAME }}
            ${{ steps.zip.outputs.ZIP_NAME }}.sha256
            ${{ steps.zip.outputs.ZIP_NAME }}.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ steps.get_version.outputs.VERSION }}
          path: ${{ steps.zip.outputs.ZIP_NAME }}
          retention-days: 90

      - name: Job summary
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          ZIP_NAME: ${{ steps.zip.outputs.ZIP_NAME }}
          ZIP_SIZE: ${{ steps.zip.outputs.ZIP_SIZE }}
          FILE_COUNT: ${{ steps.zip.outputs.FILE_COUNT }}
          CHANGELOG_FILE: ${{ steps.changelog.outputs.CHANGELOG_FILE }}
        run: |
          echo "## Release v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Zip** | \`${ZIP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Size** | ${ZIP_SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Files** | ${FILE_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changelog" >> "$GITHUB_STEP_SUMMARY"
          cat "$CHANGELOG_FILE" >> "$GITHUB_STEP_SUMMARY"
